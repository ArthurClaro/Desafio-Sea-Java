server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:sea_clientes}?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
    username: ${DB_USER:sea}
    password: ${DB_PASSWORD:sea123}
  jpa:
    # O esquema é versionado pelo Flyway (db/migration); o Hibernate apenas valida
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  viacep:
    url: https://viacep.com.br/ws
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
